spring:
  application:
    name: projecthub
  profiles:
    active: dev
  thymeleaf:
    cache: false
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB
  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}
  error:
    include-message: always
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

javamelody:
  enabled: true
  init-parameters:
    monitoring-path: /monitoring

logging:
  level:
    root: INFO
    com.example.projecthub: DEBUG

projecthub:
  seed:
    enabled: true
  uploads:
    dir: ${PROJECTHUB_UPLOADS_DIR:uploads}
