<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${project.title} + ' - ProjectHub')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>
<main class="container py-4">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/projects}">Проекты</a></li>
            <li class="breadcrumb-item active" th:text="${project.title}"></li>
        </ol>
    </nav>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h1 class="h3 mb-2 d-flex align-items-center gap-2">
                        <th:block th:replace="~{fragments/star :: button(projectId=${project.id}, starred=${starred})}"></th:block>
                        <span class="project-emoji project-emoji-lg" th:if="${project.emoji}" th:text="${project.emoji}">📁</span>
                        <span th:text="${project.title}"></span>
                    </h1>
                    <div class="text-muted mb-2 markdown-body"
                         th:utext="${@markdownService.render(project.description)}"></div>
                    <p class="mb-2">
                        <span class="badge status-badge"
                              th:classappend="${project.status.name().toLowerCase()}"
                              th:text="${project.status.label}"></span>
                        <span class="text-muted small ms-2">
                            Владелец:
                            <span th:replace="~{fragments/avatar :: inline(login=${project.owner.login})}"></span>
                            · Создан: <span th:text="${#temporals.format(project.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                        </span>
                    </p>
                    <div th:if="${progress != null}" style="max-width: 480px;">
                        <th:block th:replace="~{fragments/progress :: bar(progress=${progress})}"></th:block>
                    </div>
                </div>

                <div class="burndown-wrap mt-3">
                    <div class="text-muted small mb-1">
                        <i class="bi bi-graph-down-arrow"></i> Burndown за 30 дней
                    </div>
                    <canvas id="burndownChart"
                            th:data-labels="${#strings.listJoin(burnLabels, '|')}"
                            th:data-open="${#strings.listJoin(burnOpen, '|')}"
                            th:data-done="${#strings.listJoin(burnDone, '|')}"
                            style="max-height: 180px;"></canvas>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/projects/{id}/edit(id=${project.id})}" class="btn btn-outline-secondary">
                        <i class="bi bi-pencil"></i> Редактировать
                    </a>
                    <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post"
                          onsubmit="return confirm('Удалить проект и все его задачи?');">
                        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger">
                            <i class="bi bi-trash"></i> Удалить
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Задачи</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/projects/{id}/board(id=${project.id})}" class="btn btn-outline-primary">
                <i class="bi bi-kanban"></i> Канбан
            </a>
            <a th:href="@{/projects/{id}/calendar(id=${project.id})}" class="btn btn-outline-primary">
                <i class="bi bi-calendar3"></i> Календарь
            </a>
            <a th:href="@{/projects/{id}/tasks/export.csv(id=${project.id})}"
               class="btn btn-outline-success"
               title="Скачать список задач в CSV (UTF-8 с BOM, открывается в Excel)">
                <i class="bi bi-file-earmark-spreadsheet"></i> CSV
            </a>
            <a th:href="@{/projects/{id}/tasks/new(id=${project.id})}" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> Новая задача
            </a>
        </div>
    </div>

    <form th:action="@{/projects/{id}(id=${project.id})}" method="get" class="row g-2 mb-3">
        <div class="col-md-4">
            <select name="status" class="form-select">
                <option value="">Все статусы</option>
                <option th:each="s : ${statuses}" th:value="${s.name()}"
                        th:text="${s.label}"
                        th:selected="${statusFilter != null and statusFilter.name() == s.name()}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <select name="sort" class="form-select">
                <option value="deadline,asc" th:selected="${currentSort == 'deadline,asc'}">Дедлайн ↑</option>
                <option value="deadline,desc" th:selected="${currentSort == 'deadline,desc'}">Дедлайн ↓</option>
                <option value="createdAt,desc" th:selected="${currentSort == 'createdAt,desc'}">Сначала новые</option>
                <option value="status,asc" th:selected="${currentSort == 'status,asc'}">По статусу</option>
            </select>
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-outline-secondary w-100">
                <i class="bi bi-funnel"></i> Применить
            </button>
        </div>
    </form>

    <div th:if="${tasks.totalElements == 0}" class="empty-state">
        <i class="bi bi-list-task"></i>
        <p class="mt-2 mb-0">Задач нет. Создайте первую задачу!</p>
    </div>

    <div th:if="${tasks.totalElements > 0}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Название</th>
                    <th>Приоритет</th>
                    <th>Статус</th>
                    <th>Теги</th>
                    <th>Исполнитель</th>
                    <th>Дедлайн</th>
                    <th class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${tasks.content}" class="task-row">
                    <td>
                        <a th:href="@{/tasks/{id}(id=${t.id})}" th:text="${t.title}" class="fw-semibold text-decoration-none"></a>
                    </td>
                    <td>
                        <span th:if="${t.priority != null}" class="badge priority-badge"
                              th:classappend="${t.priority.badgeClass}"
                              th:title="${t.priority.label}">
                            <i class="bi" th:classappend="${t.priority.icon}"></i>
                            <span th:text="${t.priority.label}">Средний</span>
                        </span>
                    </td>
                    <td>
                        <span class="badge status-badge"
                              th:classappend="${t.status.name().toLowerCase().replace('_', '-')}"
                              th:text="${t.status.label}"></span>
                    </td>
                    <td>
                        <span th:each="tag : ${t.tags}" class="badge bg-light text-dark border tag-chip me-1"
                              th:text="'#' + ${tag}">#tag</span>
                        <span th:if="${#sets.isEmpty(t.tags)}" class="text-muted">-</span>
                    </td>
                    <td>
                        <span th:if="${t.assignee != null}"
                              th:replace="~{fragments/avatar :: inline(login=${t.assignee.login})}"></span>
                        <span th:if="${t.assignee == null}" class="text-muted">-</span>
                    </td>
                    <td th:text="${t.deadline != null ? #temporals.format(t.deadline, 'dd.MM.yyyy') : '-'}"></td>
                    <td class="text-end">
                        <a th:href="@{/tasks/{id}/edit(id=${t.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/tasks/{id}/delete(id=${t.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Удалить задачу?');">
                            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: pagination(${tasks}, '/projects/' + ${project.id} + '?status=' + (${statusFilter} != null ? ${statusFilter.name()} : '') + '&sort=' + ${currentSort})}"></div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/webjars/chart.js/4.4.1/dist/chart.umd.js}"></script>
<script th:src="@{/js/burndown.js}" defer></script>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
