<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${isNew} ? 'Новая задача - ProjectHub' : 'Редактирование задачи - ProjectHub')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>
<main class="container py-4">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/projects}">Проекты</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.title}"></a>
            </li>
            <li class="breadcrumb-item active" th:text="${isNew} ? 'Новая задача' : 'Редактирование'"></li>
        </ol>
    </nav>

    <h1 class="h3 mb-3" th:text="${isNew} ? 'Новая задача' : 'Редактирование задачи'"></h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${isNew} ? @{/projects/{pid}/tasks(pid=${project.id})} : @{/tasks/{id}(id=${form.id})}"
                  th:object="${form}" method="post" novalidate>
                <input type="hidden" th:if="${form.id}" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label" for="title">Название</label>
                    <input id="title" type="text" th:field="*{title}"
                           class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="description">
                        Описание
                        <span class="badge bg-light text-muted ms-1" title="Поддерживается Markdown">
                            <i class="bi bi-markdown"></i> Markdown
                        </span>
                    </label>
                    <textarea id="description" rows="4" th:field="*{description}"
                              class="form-control font-monospace" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                              placeholder="**жирный**, *курсив*, `код`, [ссылка](https://…), - списки"></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>
                <div class="row g-3">
                    <div class="col-md-3 mb-3">
                        <label class="form-label" for="status">Статус</label>
                        <select id="status" th:field="*{status}" class="form-select">
                            <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label" for="priority">Приоритет</label>
                        <select id="priority" th:field="*{priority}" class="form-select">
                            <option th:each="p : ${priorities}" th:value="${p.name()}" th:text="${p.label}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label" for="deadline">Дедлайн</label>
                        <input id="deadline" type="date" th:field="*{deadline}" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label" for="assigneeId">Исполнитель</label>
                        <select id="assigneeId" th:field="*{assigneeId}" class="form-select">
                            <option value="">- Не назначен -</option>
                            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.login}"></option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="tagsCsv">
                        Теги
                        <span class="text-muted small">через запятую или пробел: <code>backend bug urgent</code></span>
                    </label>
                    <input id="tagsCsv" type="text" th:field="*{tagsCsv}"
                           class="form-control" placeholder="backend, api, refactor"
                           th:classappend="${#fields.hasErrors('tagsCsv')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{tagsCsv}"></div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check2"></i> Сохранить
                    </button>
                    <a th:href="${form.id} ? @{/tasks/{id}(id=${form.id})} : @{/projects/{id}(id=${project.id})}"
                       class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
