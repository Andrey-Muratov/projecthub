<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Пользователи - ProjectHub')}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar}"></header>
<main class="container py-4">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/projects}">Главная</a></li>
            <li class="breadcrumb-item">Админ</li>
            <li class="breadcrumb-item active">Пользователи</li>
        </ol>
    </nav>

    <h1 class="h3 mb-3">Пользователи</h1>

    <form th:action="@{/admin/users}" method="get" class="row g-2 mb-3">
        <div class="col-md-8">
            <input type="text" name="search" class="form-control" placeholder="Поиск по логину" th:value="${search}">
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-outline-secondary w-100">
                <i class="bi bi-search"></i> Найти
            </button>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Логин</th>
                    <th>Роль</th>
                    <th>Создан</th>
                    <th>Сменить роль</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users.content}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.login}"></td>
                    <td>
                        <span class="badge bg-info text-dark" th:if="${u.role.name() == 'ADMIN'}" th:text="${u.role}"></span>
                        <span class="badge bg-secondary" th:if="${u.role.name() == 'USER'}" th:text="${u.role}"></span>
                    </td>
                    <td th:text="${#temporals.format(u.createdAt, 'dd.MM.yyyy')}"></td>
                    <td>
                        <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="d-flex gap-2">
                            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <select name="role" class="form-select form-select-sm" style="max-width: 130px;">
                                <option th:each="r : ${roles}" th:value="${r.name()}"
                                        th:text="${r.name()}" th:selected="${r.name() == u.role.name()}"></option>
                            </select>
                            <button class="btn btn-sm btn-primary" type="submit">Сохранить</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: pagination(${users}, '/admin/users?search=' + (${search} ?: ''))}"></div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
