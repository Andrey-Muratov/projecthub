services:
  postgres:
    image: postgres:16-alpine
    container_name: projecthub-postgres
    environment:
      POSTGRES_DB: projecthub
      POSTGRES_USER: projecthub
      POSTGRES_PASSWORD: projecthub
    ports:
      - "5432:5432"
    volumes:
      - projecthub-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projecthub -d projecthub"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  projecthub-pg-data:
